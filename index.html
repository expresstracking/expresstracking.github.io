<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Express Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            background: white;
            width: 95%;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            color: #1a237e;
            margin-bottom: 6px;
        }

        .sub {
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 17px;
            border-radius: 10px;
            border: 1px solid #ccc;
            text-transform: uppercase;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            background: #1565c0;
            color: white;
            font-size: 17px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0d47a1;
        }

        #hasil {
            margin-top: 25px;
            display: none;
            text-align: left;
        }

        .status {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2e7d32;
        }

        .info {
            margin-bottom: 15px;
        }

        .timeline {
            border-left: 4px solid #1565c0;
            padding-left: 18px;
        }

        .item {
            margin-bottom: 18px;
            position: relative;
        }

        .item::before {
            content: "";
            width: 12px;
            height: 12px;
            background: #1565c0;
            border-radius: 50%;
            position: absolute;
            left: -25px;
            top: 4px;
        }

        .waktu {
            font-size: 13px;
            color: #777;
        }

        .pesan {
            font-size: 16px;
            margin-top: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 13px;
        }

        .error-box {
            background: #ffebee;
            color: #b71c1c;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div class="header">📦 EXPRESS TRACKING</div>
        <div class="sub">Lacak Pengiriman Anda</div>

        <!-- INPUT -->
        <input id="resi" placeholder="Masukkan Nomor Resi" value="WS250704001" />

        <!-- TOMBOL -->
        <button onclick="cekResi()">LACAK PENGIRIMAN</button>

        <!-- HASIL (awalnya disembunyikan) -->
        <div id="hasil">
            <div class="status" id="status"></div>
            <div class="info">
                <b>Nomor Resi</b>
                <div id="nomor"></div>
            </div>
            <div class="info">
                <b>Penerima</b>
                <div id="nama"></div>
            </div>
            <div class="timeline" id="timeline"></div>
        </div>

        <!-- ERROR (akan muncul jika resi tidak ditemukan) -->
        <div id="error" class="error-box"></div>

        <div class="footer">© 2026 Express Tracking</div>
    </div>

    <script>
        // ----------------------------------------------------------------
        // 1. DATA RESI (HARDCODE) – TAMBAHKAN SESUAI KEBUTUHAN
        // ----------------------------------------------------------------
        const dataResi = {
            "WS250704001": {
                nama: "flora/qori",
                status: "on hold",
                timeline: [
                     
                    ["04 Jul 2026 15:45", "On hold - kirim ulang"]
                ]
            }
            // Jika mau tambah resi lain, tulis seperti ini:
            // "WS250704002": {
            //     nama: "budi",
            //     status: "delivered",
            //     timeline: [
            //         ["04 Jul 2026 09:00", "Pesanan diterima"],
            //         ["05 Jul 2026 10:00", "Telah sampai tujuan"]
            //     ]
            // }
        };

        // ----------------------------------------------------------------
        // 2. FUNGSI CEK RESI
        // ----------------------------------------------------------------
        function cekResi() {
            const input = document.getElementById("resi");
            const nomor = input.value.trim().toUpperCase();

            // Sembunyikan hasil & error sebelumnya
            document.getElementById("hasil").style.display = "none";
            document.getElementById("error").style.display = "none";

            // Validasi input kosong
            if (nomor === "") {
                const err = document.getElementById("error");
                err.textContent = "⚠️ Silakan masukkan nomor resi.";
                err.style.display = "block";
                return;
            }

            // Cari data
            const data = dataResi[nomor];

            if (data) {
                // Tampilkan hasil
                document.getElementById("hasil").style.display = "block";
                document.getElementById("nomor").textContent = nomor;
                document.getElementById("nama").textContent = data.nama;
                document.getElementById("status").textContent = data.status;

                // Buat timeline
                let html = "";
                data.timeline.forEach(function(item) {
                    html += `
                        <div class="item">
                            <div class="waktu">${item[0]}</div>
                            <div class="pesan">${item[1]}</div>
                        </div>
                    `;
                });
                document.getElementById("timeline").innerHTML = html;

            } else {
                // Resi tidak ditemukan
                const err = document.getElementById("error");
                err.textContent = `❌ Nomor resi ${nomor} tidak ditemukan.`;
                err.style.display = "block";
            }
        }

        // ----------------------------------------------------------------
        // 3. OTOMATIS CEK SAAT HALAMAN DIMUAT (jika input sudah terisi)
        // ----------------------------------------------------------------
        window.addEventListener("load", function() {
            const input = document.getElementById("resi");
            if (input.value.trim() !== "") {
                cekResi();
            }
        });

        // ----------------------------------------------------------------
        // 4. TEKAN ENTER UNTUK MENCARI
        // ----------------------------------------------------------------
        document.getElementById("resi").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                cekResi();
            }
        });
    </script>
</body>
</html>
